name: Daily PubMed Notification

on:
  schedule:
    # 한국 시간(KST) 오전 6:30은 UTC 기준 전날 21:30입니다.
    # 분(30) 시(21) 일(*) 월(*) 요일(*) 순서입니다.
    - cron: '30 21 * * *'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install biopython openai

      - name: Run Script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py
